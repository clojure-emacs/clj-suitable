name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

jobs:
  test:
    name: Test (JDK ${{ matrix.jdk }} / Clojure ${{ matrix.clojure }})
    runs-on: ubuntu-latest
    # Clojure master is bleeding edge, so we don't want it to fail the build.
    continue-on-error: ${{ matrix.clojure == 'master' }}
    strategy:
      fail-fast: false
      matrix:
        jdk: [11, 17, 21]
        clojure: ['1.11', '1.12', 'master']
        exclude:
          # ClojureScript 1.12+ bundles a Closure Compiler that requires JDK 21,
          # so only the 1.11 line (ClojureScript 1.11) runs on the older JDKs.
          - {jdk: 11, clojure: '1.12'}
          - {jdk: 17, clojure: '1.12'}
          - {jdk: 11, clojure: 'master'}
          - {jdk: 17, clojure: 'master'}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            .cpcache
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
      - name: Run tests
        run: clojure -M:test:test-runner:${{ matrix.clojure }}

  lint:
    name: Lint (clj-kondo + Eastwood)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Eastwood loads the shadow-cljs dev namespaces, and shadow-cljs 3.x
          # requires JDK 21.
          java-version: 21
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            .cpcache
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
      - name: clj-kondo
        run: make kondo
      - name: Eastwood
        run: make eastwood

  deploy:
    name: Deploy to Clojars
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
      - name: Compute version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Write version.edn
        run: printf '"%s"' "${{ steps.version.outputs.version }}" > resources/suitable/version.edn
      - name: Deploy
        run: clojure -T:build deploy
        env:
          PROJECT_VERSION: ${{ steps.version.outputs.version }}
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
